<!DOCTYPE html>
<html>
<head>
<title>Indie Web</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 50px;
    background-color: #f0f0f0;
    color: #333;
  }
  h1 {
    color: #007acc;
  }

  input[type="text"] {
    padding: 10px;
    font-size: 16px;
    width: 250px;
  }

  button {
    padding: 10px 15px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Welcome to the Indie Web</h1>
<p>
  Welcome! If you would like to add a website, make a commit on
  <a href="https://github.com/Darkwing14/IndieWeb">GitHub</a>.
</p>

<br>

<form id="searchForm">
  <input type="text" id="searchInput" placeholder="Search for a city..." required>
  <button type="submit">Go</button>
</form>
<img src="https://raw.githubusercontent.com/Darkwing14/IndieWeb/main/resources/hamster.png" alt="hamster">
<img src="https://raw.githubusercontent.com/Darkwing14/IndieWeb/main/resources/sparkle.png" alt="sparkles">
<img src="https://raw.githubusercontent.com/Darkwing14/IndieWeb/main/resources/pc.png" alt="console">

<script>
  document.getElementById("searchForm").addEventListener("submit", function(event) {
    event.preventDefault();

    let query = document.getElementById("searchInput").value.trim();

    if (query) {
      // Lowercase
      query = query.toLowerCase();

      // Replace one or more spaces with a single dash
      query = query.replace(/\s+/g, "-");

      // Encode for safety
      const encodedQuery = encodeURIComponent(query);

      window.location.href = "https://darkwing14.github.io/IndieWeb/city/" + encodedQuery;
    }
  });
</script>

<br>
<br>
<a href="https://github.com/Darkwing14/IndieWeb/wiki">If you would like to search in general instead of just typing a city name, click here to go to the wiki.</a>
<br>
<a href="https://darkwing14.github.io/IndieWeb/database">All cities :)</a>
<br>
<br>
<a href="https://darkwing14.github.io/IndieWeb/links">Links</a>

</body>
</html>
